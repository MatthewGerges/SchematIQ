<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchematIQ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --panel2: rgba(255, 255, 255, 0.10);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);
        --border: rgba(255, 255, 255, 0.12);
        --accent: #5eead4;
        --danger: #fb7185;
        --warn: #fbbf24;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: radial-gradient(1200px 600px at 20% 0%, rgba(94, 234, 212, 0.16), transparent 60%),
          radial-gradient(1000px 700px at 90% 20%, rgba(99, 102, 241, 0.18), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      * {
        box-sizing: border-box;
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
