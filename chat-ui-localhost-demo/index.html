<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSCircuit Localhost with Chat Panel</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #e8ebf3;
      }

      .page {
        display: flex;
        min-height: 100vh;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: #111933;
      }

      .toggle-btn {
        border: 1px solid #3b4a80;
        background: #1d2a52;
        color: #f4f7ff;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .toggle-btn:hover {
        background: #28396e;
      }

      .canvas-area {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .canvas-mock {
        width: min(1000px, 100%);
        height: min(640px, 78vh);
        border: 2px dashed #4c5f99;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: #aab4d0;
        background: #0f1730;
      }

      .chat-panel {
        width: 360px;
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        background: #0f1730;
        display: flex;
        flex-direction: column;
        transition: transform 160ms ease-in-out, opacity 160ms ease-in-out;
      }

      .chat-panel.hidden {
        transform: translateX(100%);
        opacity: 0;
        pointer-events: none;
        width: 0;
        border-left: none;
      }

      .chat-header {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-weight: 600;
      }

      .chat-messages {
        flex: 1;
        overflow: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg {
        padding: 10px 12px;
        border-radius: 10px;
        line-height: 1.4;
        font-size: 14px;
      }

      .msg.system {
        background: rgba(117, 133, 255, 0.15);
      }

      .msg.user {
        background: rgba(59, 212, 146, 0.18);
      }

      .chat-input-row {
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        padding: 10px;
      }

      .chat-input {
        width: 100%;
        border: 1px solid #3b4a80;
        border-radius: 8px;
        padding: 10px 12px;
        background: #111933;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="main">
        <div class="toolbar">
          <div>TSCircuit Localhost Mock</div>
          <button id="toggle-chat" class="toggle-btn">Hide Chat</button>
        </div>
        <section class="canvas-area">
          <div class="canvas-mock">
            Placeholder for your tscircuit local page content
          </div>
        </section>
      </main>

      <aside id="chat-panel" class="chat-panel">
        <div class="chat-header">Chat Panel (UI Only)</div>
        <div class="chat-messages">
          <div class="msg system">This is a visual-only prototype.</div>
          <div class="msg user">No backend or chat logic is connected yet.</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" placeholder="Type message (disabled demo)" />
        </div>
      </aside>
    </div>

    <script>
      const toggleButton = document.getElementById("toggle-chat");
      const chatPanel = document.getElementById("chat-panel");
      let isVisible = true;

      toggleButton.addEventListener("click", () => {
        isVisible = !isVisible;
        chatPanel.classList.toggle("hidden", !isVisible);
        toggleButton.textContent = isVisible ? "Hide Chat" : "Show Chat";
      });
    </script>
  </body>
  </html>
